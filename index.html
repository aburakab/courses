<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programming Advices · Learning Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0f11;
      --bg-card: #15171a;
      --bg-card-hover: #1c1f23;
      --border: #26292e;
      --border-hover: #3a3f46;
      --text: #e8e8e6;
      --text-dim: #8a8f96;
      --text-muted: #5a5f66;
      --accent: #ff8c42;
      --accent-soft: rgba(255, 140, 66, 0.12);
      --accent-border: rgba(255, 140, 66, 0.35);
      --tag-bg: #1f2226;
      --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
      --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      background-position: -1px -1px;
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    /* subtle radial fade over the grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, transparent 0%, var(--bg) 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1180px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }

    /* ---------- Header ---------- */
    header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 32px;
      border-bottom: 1px dashed var(--border);
      margin-bottom: 40px;
    }

    .crumb {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .crumb .dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }

    h1 {
      font-family: var(--font-sans);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin-top: 8px;
    }

    h1 .slash { color: var(--accent); }

    .subtitle {
      color: var(--text-dim);
      font-size: 1.05rem;
      max-width: 640px;
      margin-top: 8px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
    }

    .meta-row span strong {
      color: var(--text);
      font-weight: 500;
    }

    /* ---------- Controls ---------- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      margin-bottom: 32px;
    }

    .search-wrap {
      flex: 1;
      min-width: 240px;
      position: relative;
    }

    .search-wrap::before {
      content: '⌕';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      pointer-events: none;
    }

    input[type="search"] {
      width: 100%;
      padding: 12px 16px 12px 40px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, background-color 0.15s;
    }

    input[type="search"]:focus {
      border-color: var(--accent-border);
      background: var(--bg-card-hover);
    }

    input[type="search"]::placeholder { color: var(--text-muted); }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 7px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .chip:hover {
      color: var(--text);
      border-color: var(--border-hover);
    }

    .chip.active {
      background: var(--accent-soft);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    /* ---------- Grid ---------- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 22px 22px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, background-color 0.2s;
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .card:hover::after { width: 100%; }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    .card-num { color: var(--accent); }

    .card h3 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .card p {
      color: var(--text-dim);
      font-size: 0.92rem;
      line-height: 1.55;
      flex-grow: 1;
    }

    .card-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-top: 12px;
      border-top: 1px dashed var(--border);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      padding: 3px 8px;
      background: var(--tag-bg);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 10px;
      border-radius: 3px;
      letter-spacing: 0.04em;
    }

    .open {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      transition: color 0.15s, transform 0.15s;
    }

    .card:hover .open {
      color: var(--accent);
      transform: translateX(3px);
    }

    /* ---------- Empty state ---------- */
    .empty {
      display: none;
      padding: 60px 20px;
      text-align: center;
      color: var(--text-muted);
      font-family: var(--font-mono);
      border: 1px dashed var(--border);
      border-radius: 8px;
    }

    .empty.show { display: block; }

    /* ---------- Footer ---------- */
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px dashed var(--border);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 16px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    footer a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: var(--accent); }

    /* ---------- Entrance animation ---------- */
    .card {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.45s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .container { padding: 32px 16px 64px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="crumb"><span class="dot"></span> <span>ProgrammingAdvices / Learning Resources</span></div>
      <h1>Learning Hub <span class="slash">/</span></h1>
      <p class="subtitle">
        A collection of interactive concept pages and visual guides for students.
        Click any card to open the lesson.
      </p>
      <div class="meta-row">
        <span><strong id="total-count">0</strong> resources</span>
        <span>Last updated · <strong id="today"></strong></span>
        <span>by <strong>Mohammad Aljaber</strong></span>
      </div>
    </header>

    <div class="controls">
      <div class="search-wrap">
        <input type="search" id="search" placeholder="Search by title, topic, or tag…" autocomplete="off" />
      </div>
      <div class="filters" id="filters">
        <!-- chips are generated from data -->
      </div>
    </div>

    <main class="grid" id="grid">
      <!-- cards are generated from data -->
    </main>

    <div class="empty" id="empty">
      No resources match your search.
    </div>

    <footer>
      <span>Programming Advices</span>
    </footer>

  </div>

  <script>
    // ------------------------------------------------------------------
    // EDIT THIS LIST — add, remove, or reorder your lessons here.
    // Each entry:
    //   file:        the HTML filename in this same folder (or a full URL)
    //   title:       the lesson title shown on the card
    //   description: one-or-two sentence summary
    //   category:    used to group/filter (e.g. "Programming", "3D Printing")
    //   tags:        array of short labels shown on the card
    // ------------------------------------------------------------------
    const resources = [
      {
        file: 'git-visualizer.html',
        title: 'Git Visualizer',
        description: 'A visual walkthrough of how Git thinks — commits, branches, HEAD, merges, and rebases explained with diagrams.',
        category: 'Programming',
        tags: ['git', 'version-control', 'beginner']
      }
    ];
    // ------------------------------------------------------------------

    const grid     = document.getElementById('grid');
    const empty    = document.getElementById('empty');
    const search   = document.getElementById('search');
    const filters  = document.getElementById('filters');
    const total    = document.getElementById('total-count');

    total.textContent = resources.length;
    document.getElementById('today').textContent =
      new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

    // Build category chips
    const categories = ['All', ...new Set(resources.map(r => r.category))];
    let activeCategory = 'All';
    categories.forEach(cat => {
      const chip = document.createElement('button');
      chip.className = 'chip' + (cat === 'All' ? ' active' : '');
      chip.textContent = cat;
      chip.addEventListener('click', () => {
        activeCategory = cat;
        filters.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        render();
      });
      filters.appendChild(chip);
    });

    function render() {
      const q = search.value.trim().toLowerCase();
      grid.innerHTML = '';

      const filtered = resources.filter(r => {
        const matchCat = activeCategory === 'All' || r.category === activeCategory;
        const haystack = (r.title + ' ' + r.description + ' ' + r.tags.join(' ') + ' ' + r.category).toLowerCase();
        const matchQ = !q || haystack.includes(q);
        return matchCat && matchQ;
      });

      if (filtered.length === 0) {
        empty.classList.add('show');
        return;
      }
      empty.classList.remove('show');

      filtered.forEach((r, i) => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = r.file;
        a.style.animationDelay = (i * 40) + 'ms';
        const num = String(resources.indexOf(r) + 1).padStart(2, '0');
        a.innerHTML = `
          <div class="card-head">
            <span class="card-num">${num}</span>
            <span>${r.category.toUpperCase()}</span>
          </div>
          <h3>${r.title}</h3>
          <p>${r.description}</p>
          <div class="card-foot">
            <div class="tags">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            <span class="open">OPEN →</span>
          </div>
        `;
        grid.appendChild(a);
      });
    }

    search.addEventListener('input', render);
    render();
  </script>
</body>
</html>
